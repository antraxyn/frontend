<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanlucid Digital E-Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        const fpPromise = import('https://openfpcdn.io/fingerprintjs/v4').then(FingerprintJS => FingerprintJS.load());
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        .glass-panel { background: rgba(20, 25, 40, 0.4); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(25, 30, 45, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); transition: transform 0.2s ease; }
        .glass-card:hover { transform: translateY(-4px); background: rgba(35, 40, 55, 0.98); }
        .popup-scale { animation: popScale 0.3s ease-out forwards; }
        @keyframes popScale { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="text-slate-200 font-sans antialiased bg-[#050b14] pb-20">
    <nav class="sticky top-0 z-50 glass-panel">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="text-xl font-bold tracking-widest text-white">SANLUCID<span class="text-cyan-400">.</span></div>
            <input type="text" id="desktopSearch" oninput="handleSearch(this.value)" class="hidden md:block w-64 px-4 py-2 rounded-full bg-white/[0.04] border border-white/20 text-white focus:outline-none focus:ring-1 focus:ring-cyan-400" placeholder="Cari e-book...">
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4" id="productGrid">
            <div class="col-span-full text-center py-10 text-white/50"><i class="fa-solid fa-circle-notch fa-spin text-3xl"></i><p>Memuat Katalog...</p></div>
        </div>
    </main>

    <!-- POP-UP DETAIL -->
    <div id="popupDetail" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onclick="tutupPopupOverlay(event)">
        <div class="flex flex-col items-center w-full max-w-sm">
            <div class="bg-[#0f172a] border border-white/10 rounded-2xl w-full flex flex-col overflow-hidden shadow-2xl popup-scale" style="max-height: 80vh;">
                <div class="p-4 flex flex-col items-center text-center border-b border-white/5">
                    <img id="popImg" src="" class="w-24 h-auto rounded-lg mb-3 shadow-lg">
                    <h3 id="popJudul" class="text-base font-bold text-white"></h3>
                </div>
                <div class="p-4 overflow-y-auto grow text-sm text-white/70 text-justify" id="popDeskripsi"></div>
                <div class="p-4 bg-white/[0.03] border-t border-white/10">
                    <a id="popSampleBtn" href="#" target="_blank" class="block w-full py-3 bg-emerald-500 text-white text-center text-sm font-bold rounded-xl">Baca Free Sample</a>
                </div>
            </div>
            <button onclick="tutupPopup()" class="mt-4 bg-red-500 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://guleleng.onrender.com/api";
        let appState = { allProducts: [], filteredProducts: [], purchasedMap: {}, fingerprint: "" };

        async function initializeApp() {
            try {
                const fp = await (await import('https://openfpcdn.io/fingerprintjs/v4')).load();
                appState.fingerprint = (await fp.get()).visitorId;
                const [products, purchases] = await Promise.all([
                    fetch(`${API_BASE_URL}/products`).then(r => r.json()),
                    fetch(`${API_BASE_URL}/purchases`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ fingerprint: appState.fingerprint }) }).then(r => r.ok ? r.json() : {purchases:{}})
                ]);
                appState.allProducts = products;
                appState.filteredProducts = products;
                appState.purchasedMap = purchases.purchases || {};
                renderProducts();
            } catch(e) { console.error(e); }
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            appState.filteredProducts.forEach(p => {
                const safeImg = `https://wsrv.nl/?url=${p.cover_url.replace("i.ibb.co", "i.ibb.co.com")}`;
                const downloadUrl = appState.purchasedMap[p.id];
                grid.innerHTML += `
                    <div class="glass-card rounded-2xl p-2 flex flex-col">
                        <div class="relative group">
                            <button onclick="bukaPopup('${safeImg}', '${p.kategori}', '${p.title}', '${p.deskripsi.replace(/'/g, "\\'")}', 'https://kurir-toko.akun-anda.workers.dev/sample?file_id=${p.sample_file_id}')" class="absolute top-2 left-2 bg-black/60 w-8 h-8 rounded-full text-white"><i class="fa-solid fa-eye text-xs"></i></button>
                            <img src="${safeImg}" class="w-full aspect-[2/3] object-cover rounded-xl">
                        </div>
                        <div class="p-2 grow">
                            <h3 class="text-xs font-bold line-clamp-2">${p.title}</h3>
                            <p class="text-cyan-400 font-bold text-sm">Rp ${new Intl.NumberFormat('id-ID').format(p.price)}</p>
                            ${downloadUrl ? `<a href="${downloadUrl}" class="block mt-2 py-1 text-center bg-cyan-600 text-xs font-bold rounded-lg">Unduh</a>` : `<button onclick="processCheckout('${p.id}')" class="w-full mt-2 py-1 bg-white/10 text-xs font-bold rounded-lg">Beli</button>`}
                        </div>
                    </div>`;
            });
        }

        function bukaPopup(img, kat, jud, desk, link) {
            document.getElementById('popImg').src = img;
            document.getElementById('popJudul').innerText = jud;
            document.getElementById('popDeskripsi').innerHTML = desk;
            document.getElementById('popSampleBtn').href = link;
            document.getElementById('popupDetail').classList.replace('hidden', 'flex');
        }

        function tutupPopup() { document.getElementById('popupDetail').classList.replace('flex', 'hidden'); }
        function tutupPopupOverlay(e) { if(e.target.id === 'popupDetail') tutupPopup(); }
        
        function handleSearch(q) {
            appState.filteredProducts = appState.allProducts.filter(p => p.title.toLowerCase().includes(q.toLowerCase()));
            renderProducts();
        }

        async function processCheckout(id) {
            const r = await fetch(`${API_BASE_URL}/checkout`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({product_id:id, fingerprint:appState.fingerprint}) });
            const d = await r.json();
            alert("ID Pesanan: " + d.order_id);
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
